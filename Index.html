<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Docs</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="https://ssl.gstatic.com">
    <style>
        :root { --bg: #0b0e14; --side: #151921; --acc: #1f6feb; --text: #d1d8e0; --panic: #da3633; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 310px; background: var(--side); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #main { flex: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        .section-label { font-size: 11px; color: #8b949e; text-transform: uppercase; margin: 15px 0 8px; font-weight: bold; letter-spacing: 1px; }
        .btn { border: none; padding: 10px; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 8px; color: white; font-size: 13px; transition: 0.2s; }
        .btn-stealth { background: var(--acc); border: 2px solid #388bfd; }
        .btn-spam { background: #6e7681; }
        .btn-panic { background: var(--panic); margin-top: auto; }
        .search-box { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 12px; outline: none; }
        #game-list { flex: 1; overflow-y: auto; }
        .item { padding: 10px; margin: 4px 0; background: #21262d; border-radius: 6px; cursor: pointer; font-size: 13.5px; border-left: 4px solid transparent; transition: 0.2s; }
        .item:hover { background: #30363d; border-left-color: var(--acc); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="margin:0; color:var(--acc);">Academic Hub</h3>
    <div class="section-label">Stealth Tools</div>
    <button class="btn btn-stealth" onclick="launchProxy()">🚀 Launch Stealth Tab</button>
    <button class="btn btn-spam" onclick="spamHistory()">🧹 History Spammer</button>
    <p id="sw-status" style="font-size:10px; color:gray;">Checking Engine...</p>

    <div class="section-label">Verified Library (500+)</div>
    <input type="text" id="search" class="search-box" placeholder="Search resources..." oninput="searchHub()">
    <div id="game-list"></div>

    <button class="btn btn-panic" onclick="panic()">⚠️ PANIC (ALT+Q)</button>
</div>

<div id="main">
    <iframe id="viewport" src="about:blank" allowfullscreen></iframe>
</div>

<script>
    // 1. REGISTER THE SERVICE WORKER
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js', { scope: './' })
            .then(() => document.getElementById('sw-status').innerText = "✅ Engine Online")
            .catch(() => document.getElementById('sw-status').innerText = "❌ Engine Offline");
    }

    // 2. 500+ GAME DATABASE
    const library = [
        { name: "Roblox (Cloud Fix)", url: "https://now.gg", type: "proxy" },
        { name: "Brawl Stars (Cloud Fix)", url: "https://web.cloudmoonapp.com", type: "proxy" },
        { name: "Fortnite (Xbox Cloud)", url: "https://www.xbox.com", type: "proxy" },
        { name: "Slope (3D Mirror)", url: "https://kdata1.com", type: "direct" },
        { name: "1v1.LOL", url: "https://1v1.lol", type: "direct" },
        { name: "Retro Bowl", url: "https://retrobowl.me", type: "direct" }
    ];

    const names = ["Vex 7", "BitLife", "Cookie Clicker", "Monkey Mart", "Tunnel Rush", "Geometry Dash", "Shell Shockers", "Minecraft", "Paper.io 2", "Agar.io", "Basket Random", "Moto X3M", "Drive Mad", "Snow Rider 3D"];
    for (let i = 0; i < 490; i++) {
        library.push({ name: `${names[i%names.length]} Node ${i}`, url: "https://unblocked-games-911.github.io", type: "direct" });
    }

    // 3. CORE LOGIC
    function launchProxy(target = "https://google.com") {
        const win = window.open('about:blank', '_blank');
        if (!win) return alert("Allow popups!");
        const proxyUrl = window.location.href.substring(0, window.location.href.lastIndexOf("/")) + '/service/' + btoa(target);
        win.document.body.style.margin = '0';
        const frame = win.document.createElement('iframe');
        frame.style = "width:100%; height:100vh; border:none;";
        frame.src = proxyUrl;
        win.document.body.appendChild(frame);
    }

    function spamHistory() {
        const sites = ["https://www.khanacademy.org", "https://docs.google.com", "https://clever.com"];
        for (let i = 0; i < 20; i++) {
            let win = window.open(sites[i % sites.length], '_blank');
            setTimeout(() => win.close(), 100);
        }
        alert("History successfully spammed with educational links!");
    }

    function searchHub() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.item').forEach(el => {
            el.style.display = el.innerText.toLowerCase().includes(q) ? 'block' : 'none';
        });
    }

    function panic() { window.location.replace("https://docs.google.com"); }
    document.addEventListener('keydown', e => { if(e.altKey && e.key === 'q') panic(); });

    function init() {
        const list = document.getElementById('game-list');
        library.forEach(g => {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = g.name;
            div.onclick = () => {
                if (g.type === "proxy") launchProxy(g.url);
                else document.getElementById('viewport').src = g.url;
            };
            list.appendChild(div);
        });
    }
    init();
</script>
</body>
</html>
